[Output Configuration]
undo_levels = 1000
space_placement = After Output
start_attached = True

[Logging Configuration]
log_file = ~/Desktop/strokes.log
enable_stroke_logging = True
enable_translation_logging = True

[Stroke Display]
show = True

[Suggestions Display]
show = True

[Translation Frame]
opacity = 100

[Machine Configuration]
auto_start = True
machine_type = Plover HID

[Gemini PR]
baudrate = 9600
bytesize = 8
parity = N
port = /dev/cu.usbmodem104
stopbits = 1
timeout = 1.3

[System]
name = Lapwing

[Plugins]
enabled_extensions = ["modal_update", "plover_auto_reconnect_machine"]

[System: Lapwing]
dictionaries = [{"enabled": true, "path": "user.json"}, {"enabled": true, "path": "jeff-phrasing.py"}, {"enabled": true, "path": "abby-left-hand-modifiers.py"}, {"enabled": true, "path": "emily-modifiers.py"}, {"enabled": true, "path": "emily-symbols.py"}, {"enabled": false, "path": "lapwing-movement.modal"}, {"enabled": true, "path": "lapwing-commands.json"}, {"enabled": true, "path": "lapwing-numbers.json"}, {"enabled": true, "path": "lapwing-uk-additions.json"}, {"enabled": true, "path": "lapwing-proper-nouns.json"}, {"enabled": true, "path": "lapwing-base.json"}, {"enabled": false, "path": "return-from-raw.json"}]

[System: English Stenotype]
dictionaries = [{"enabled": false, "path": "user.json"}, {"enabled": false, "path": "commands.json"}, {"enabled": false, "path": "main.json"}]

[Plover HID]
device_scan_interval_ms = 1000
double_tap_repeat = True
first_up_chord_send = True
repeat_delay_ms = 200
repeat_interval_ms = 30

